name: Build Sync XxX APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      apk_name:
        description: 'Nama APK Output (tanpa .apk)'
        required: true
        default: 'SyncXxX'
      build_type:
        description: 'Tipe Build'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check for uploaded ZIP
        id: check_zip
        run: |
          if [ -f "uploads/latest_project.zip" ]; then
            echo "zip_found=true" >> $GITHUB_OUTPUT
            echo "📦 User ZIP found"
          else
            echo "zip_found=false" >> $GITHUB_OUTPUT
            echo "📦 No user ZIP, using existing android/ project"
          fi

      - name: Extract User Project ZIP
        if: steps.check_zip.outputs.zip_found == 'true'
        run: |
          echo "📦 Extracting user project..."
          
          if [ -d "android" ]; then
            rm -rf android
          fi
          
          mkdir -p extracted_temp
          unzip -o uploads/latest_project.zip -d extracted_temp/
          
          echo "📁 Extracted contents:"
          ls -la extracted_temp/
          
          if [ -d "extracted_temp/android" ] && [ -f "extracted_temp/android/gradlew" ]; then
            echo "📁 Using 'android' subfolder"
            mv extracted_temp/android android
          elif [ -f "extracted_temp/gradlew" ]; then
            echo "📁 Using root contents"
            mv extracted_temp android
          else
            GRADLEW_PATH=$(find extracted_temp -name "gradlew" | head -1)
            if [ -n "$GRADLEW_PATH" ]; then
              PROJECT_DIR=$(dirname "$GRADLEW_PATH")
              echo "📁 Found gradlew in: $PROJECT_DIR"
              mv "$PROJECT_DIR" android
            else
              echo "❌ No gradlew found!"
              exit 1
            fi
          fi
          
          rm -rf extracted_temp/
          echo "📁 Final structure:"
          ls -la android/

      - name: Fix Gradle Wrapper (Auto-Generate JAR)
        run: |
          cd android
          
          # Cek gradle wrapper
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "📥 gradle-wrapper.jar missing, auto-generating..."
            mkdir -p gradle/wrapper
            
            # Install gradle dan generate wrapper
            sudo apt-get update -qq
            sudo apt-get install -y -qq unzip
            
            # Download gradle distribution
            GRADLE_VERSION="8.4"
            curl -L -o /tmp/gradle-${GRADLE_VERSION}-bin.zip \
              "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip"
            
            unzip -q /tmp/gradle-${GRADLE_VERSION}-bin.zip -d /tmp/
            
            # Generate wrapper using installed gradle
            /tmp/gradle-${GRADLE_VERSION}/bin/gradle wrapper --gradle-version ${GRADLE_VERSION}
            
            # Cleanup
            rm -rf /tmp/gradle-${GRADLE_VERSION} /tmp/gradle-${GRADLE_VERSION}-bin.zip
            
            echo "✅ Gradle wrapper generated"
          fi
          
          # Fix properties kalau tidak ada
          if [ ! -f "gradle/wrapper/gradle-wrapper.properties" ]; then
            echo "📝 Creating gradle-wrapper.properties..."
            mkdir -p gradle/wrapper
            cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
networkTimeout=10000
validateDistributionUrl=true
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
EOF
          fi
          
          chmod +x gradlew
          echo "✅ Gradle wrapper ready"
          ls -la gradle/wrapper/

      - name: Verify Android Project
        run: |
          if [ ! -f "android/gradlew" ]; then
            echo "❌ gradlew not found!"
            exit 1
          fi
          echo "✅ gradlew found"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pillow
        run: pip install Pillow

      - name: Generate App Icons
        run: |
          if [ -f "generate_icons.py" ]; then
            python3 generate_icons.py
          fi

      - name: Build APK
        run: |
          cd android
          if [ "${{ github.event.inputs.build_type }}" == "debug" ]; then
            ./gradlew assembleDebug --no-daemon
            mkdir -p ../output
            find app/build/outputs/apk/debug/ -name "*.apk" | head -1 | xargs -I{} cp {} ../output/${{ github.event.inputs.apk_name }}.apk
          else
            ./gradlew assembleRelease --no-daemon
            mkdir -p ../output
            find app/build/outputs/apk/release/ -name "*.apk" | head -1 | xargs -I{} cp {} ../output/${{ github.event.inputs.apk_name }}.apk
          fi
        shell: bash

      - name: Verify Output
        run: |
          ls -la output/ || echo "No output dir"
          if [ ! -f "output/${{ github.event.inputs.apk_name }}.apk" ]; then
            echo "❌ APK not found!"
            find . -name "*.apk" | head -10
            exit 1
          fi
          echo "✅ APK found"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.apk_name }}
          path: output/${{ github.event.inputs.apk_name }}.apk
          retention-days: 30
